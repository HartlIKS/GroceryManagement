services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_pass
      POSTGRES_DB: GroceryManager
    secrets:
      - source: postgres_pw
        target: pg_pass
    ports:
      - "5432:5432"
    volumes:
      - type: volume
        source: pg-data
        target: /var/lib/postgresql
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    depends_on:
      - postgres
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8081
      KC_HEALTH_ENABLED: true
    command:
      - "start-dev"
      - "--import-realm"
    ports:
      - "8081:8081"
    configs:
      - target: /opt/keycloak/data/import
        source: realms
  grocery-manager:
    image: ghcr.io/hartliks/grocerymanagement:master
    build:
      context: .
      target: run
    depends_on:
      - postgres
      - keycloak
    environment:
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/GroceryManager"
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI: "http://keycloak:8081/realms/GroceryManager/protocol/openid-connect/certs"
    secrets:
      - source: postgres_pw
        target: spring.datasource.password
    ports:
      - "8080:8080"


volumes:
  pg-data:
    driver: "local"

configs:
  realms:
    file: realms

secrets:
  postgres_pw:
    file: secrets/pg_pass