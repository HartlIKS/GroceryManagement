<div class="container">
  <div class="header">
    <h1>Products</h1>
    <div class="header-actions">
      <button mat-raised-button color="accent" (click)="loadProducts()" class="refresh-btn">
        <mat-icon>refresh</mat-icon>
        Refresh
      </button>
      <a mat-raised-button color="primary" routerLink="/master-data/products/new">
        <mat-icon>add</mat-icon>
        Add Product
      </a>
    </div>
  </div>

  <div class="search-section">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search products</mat-label>
      <input matInput [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" placeholder="Enter product name">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-raised-button (click)="onSearch()">Search</button>
  </div>

  <div class="table-container">
    <mat-table [dataSource]="dataSource()" class="table">
      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
        <mat-cell *matCellDef="let product">{{ product.name }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="image">
        <mat-header-cell *matHeaderCellDef>Image</mat-header-cell>
        <mat-cell *matCellDef="let product">
          @if (product.image) {
            <img [src]="product.image" [alt]="product.name" class="image-large">
          } @else {
            <span>-</span>
          }
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="EAN">
        <mat-header-cell *matHeaderCellDef>EAN</mat-header-cell>
        <mat-cell *matCellDef="let product">{{ product.EAN || '-' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let product">
          <a mat-icon-button color="primary" [routerLink]="['/master-data/products', product.uuid]">
            <mat-icon>edit</mat-icon>
          </a>
          <button mat-icon-button color="warn" (click)="onDeleteProduct(product.uuid)">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let _; columns: displayedColumns;"></mat-row>
    </mat-table>

    @if (loading()) {
      <div class="loading">
        <mat-spinner></mat-spinner>
      </div>
    } @else if (products().length === 0) {
      <div class="no-data">
        <p>No products found</p>
      </div>
    }

    @if (error()) {
      <div class="error">
        <p>{{ error() }}</p>
      </div>
    }
  </div>
</div>
