<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <button mat-icon-button class="menu-toggle" (click)="toggleMenu()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="brand-text">Grocery Manager</span>
    </div>

    <div class="nav-menu" [class.menu-open]="isMenuOpen">
      <a class="nav-item" 
         [class.active]="isActive('/dashboard')" 
         (click)="navigateTo('/dashboard')">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      
      <a class="nav-item" 
         [class.active]="isActive('/products')" 
         (click)="navigateTo('/products')">
        <mat-icon>inventory_2</mat-icon>
        <span>Products</span>
      </a>
      
      <a class="nav-item" 
         [class.active]="isActive('/stores')" 
         (click)="navigateTo('/stores')">
        <mat-icon>store</mat-icon>
        <span>Stores</span>
      </a>
      
      <a class="nav-item" 
         [class.active]="isActive('/prices')" 
         (click)="navigateTo('/prices')">
        <mat-icon>price_check</mat-icon>
        <span>Price Lists</span>
      </a>
    </div>

    @if (isMenuOpen) {
      <div class="nav-overlay" (click)="closeMenu()"></div>
    }
  </div>
</nav>
