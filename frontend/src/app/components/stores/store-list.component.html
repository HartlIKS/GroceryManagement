<div class="container">
  <div class="header">
    <h1>Stores</h1>
    <div class="header-actions">
      <button mat-raised-button color="accent" (click)="loadStores()" class="refresh-btn">
        <mat-icon>refresh</mat-icon>
        Refresh
      </button>
      <button mat-raised-button color="primary" (click)="onAddStore()">
        <mat-icon>add</mat-icon>
        Add Store
      </button>
    </div>
  </div>

  <div class="search-section">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search stores</mat-label>
      <input matInput [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" placeholder="Enter store name">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-raised-button (click)="onSearch()">Search</button>
  </div>

  <div class="table-container">
    <mat-table [dataSource]="dataSource()" class="store-table">
      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
        <mat-cell *matCellDef="let store">{{ store.name }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="logo">
        <mat-header-cell *matHeaderCellDef>Logo</mat-header-cell>
        <mat-cell *matCellDef="let store">
          @if (store.logo) {
            <img [src]="store.logo" [alt]="store.name" class="store-logo">
          } @else {
            <span>-</span>
          }
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="address">
        <mat-header-cell *matHeaderCellDef>Address</mat-header-cell>
        <mat-cell *matCellDef="let store">
          {{ formatAddress(store.address) }}
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="currency">
        <mat-header-cell *matHeaderCellDef>Currency</mat-header-cell>
        <mat-cell *matCellDef="let store">{{ store.currency || '-' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let store">
          <button mat-icon-button color="primary" (click)="onEditStore(store.uuid)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="onDeleteStore(store.uuid)">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let _; columns: displayedColumns;"></mat-row>
    </mat-table>

    @if (loading()) {
      <div class="loading">
        <mat-spinner></mat-spinner>
      </div>
    } @else if (stores().length === 0) {
      <div class="no-data">
        <p>No stores found</p>
      </div>
    }

    @if (error()) {
      <div class="error">
        <p>{{ error() }}</p>
      </div>
    }
  </div>
</div>
