<div class="container">
  <div class="header header-centered header-margin-bottom-20">
    <h1>{{ isEditing ? 'Edit Store' : 'Add New Store' }}</h1>
  </div>

  @if (!loading()) {
    <div class="form-container">
      <form [formGroup]="storeForm" (ngSubmit)="onSave()">
        <mat-card>
          <mat-card-content>
            <div class="form-row">
              <mat-form-field appearance="outline" class="full-width">
                <mat-label>Store Name *</mat-label>
                <input matInput formControlName="name" placeholder="Enter store name">
              @if (storeForm.get('name')?.hasError('required')) {
                <mat-error>
                  Store name is required
                </mat-error>
              }
              </mat-form-field>
            </div>

            <div class="form-row">
              <mat-form-field appearance="outline" class="full-width">
                <mat-label>Logo URL</mat-label>
                <input matInput formControlName="logo" placeholder="Enter store logo URL">
              </mat-form-field>
            </div>

            <div formGroupName="address">
              <div class="form-row">
                <mat-form-field appearance="outline" class="half-width">
                  <mat-label>Street</mat-label>
                  <input matInput formControlName="street" placeholder="Enter street">
                </mat-form-field>
                <mat-form-field appearance="outline" class="half-width">
                  <mat-label>Number</mat-label>
                  <input matInput formControlName="number" placeholder="Enter number">
                </mat-form-field>
              </div>

              <div class="form-row">
                <mat-form-field appearance="outline" class="half-width">
                  <mat-label>ZIP</mat-label>
                  <input matInput formControlName="zip" placeholder="Enter ZIP code">
                </mat-form-field>
                <mat-form-field appearance="outline" class="half-width">
                  <mat-label>City</mat-label>
                  <input matInput formControlName="city" placeholder="Enter city">
                </mat-form-field>
              </div>

              <div class="form-row">
                <mat-form-field appearance="outline" class="full-width">
                  <mat-label>Country</mat-label>
                  <input matInput formControlName="country" placeholder="Enter country">
                </mat-form-field>
              </div>
            </div>

            <div class="form-row">
              <mat-form-field appearance="outline" class="full-width">
                <mat-label>Currency</mat-label>
                <input matInput formControlName="currency" placeholder="Enter currency (e.g., EUR, USD)">
              </mat-form-field>
            </div>
          </mat-card-content>

          <mat-card-actions align="end">
            <button mat-raised-button type="button" (click)="onCancel()">Cancel</button>
            <button mat-raised-button color="primary" type="submit" [disabled]="storeForm.invalid">
              {{ isEditing ? 'Update' : 'Create' }}
            </button>
          </mat-card-actions>
        </mat-card>
      </form>

      @if (error()) {
        <div class="error">
          <p>{{ error() }}</p>
        </div>
      }
    </div>
  } @else {
    <div class="loading">
      <mat-spinner></mat-spinner>
    </div>
  }
</div>
